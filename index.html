<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Ngữ văn THPT – Kết nối tri thức</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #eef2f7;
        padding: 20px;
      }

      h1 {
        text-align: center;
      }

      .top-bar {
        text-align: center;
        margin-bottom: 20px;
      }

      button {
        padding: 8px 16px;
        border-radius: 12px;
        border: none;
        background: #3b6fd8;
        color: white;
        cursor: pointer;
      }

      .card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(6px);
        border-radius: 18px;
        padding: 18px;
        margin-bottom: 22px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      }

      .grade {
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
      }

      .lesson {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 12px;
        background: #e4ecff;
        cursor: pointer;
        font-weight: 600;
      }

      .text {
        margin-left: 18px;
        margin-top: 8px;
        padding: 10px 14px;
        border-radius: 10px;
        background: #f4f6fb;
        cursor: pointer;
      }

      .box,
      .options {
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        transition: max-height 0.45s ease, opacity 0.25s ease;
        margin-left: 18px;
        padding-left: 14px;
        border-left: 2px solid rgba(0, 0, 0, 0.08);
      }

      .box.show,
      .options.show {
        max-height: 1000px;
        opacity: 1;
      }

      .option {
        margin: 6px 0;
      }

      .option input[type="text"] {
        width: 65%;
        padding: 4px;
        margin-top: 4px;
      }
      /* giữ nguyên toàn bộ CSS cũ */

      .add-option {
        margin-top: 10px;
      }

      .add-option input {
        padding: 4px;
        width: 60%;
      }

      .add-option button {
        margin-left: 6px;
        padding: 4px 10px;
        border-radius: 8px;
        border: none;
        background: #4caf50;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>📚 Ngữ văn THPT – Kết nối tri thức</h1>

    <div class="top-bar">
      <button id="modeBtn">🎓 Chế độ: Học sinh</button>
    </div>

    <div id="app"></div>

    <script>
      console.log("Script bắt đầu chạy!");

      try {
        let MODE = "student";

        const OPTIONS = [
          { key: "author", label: "👤 Giới thiệu tác giả" },
          { key: "work", label: "📘 Giới thiệu tác phẩm" },
          { key: "video", label: "🎥 Video bài học" },
          { key: "practice", label: "📝 Câu hỏi ôn tập" },
        ];

        const DATA = {
          10: {
            "Bài 1: Thần thoại và sử thi": [
              "Thần Trụ Trời",
              "Đăm Săn chiến thắng Mtao Mxây",
              "Hê-ra-clét đi tìm táo vàng",
            ],
            "Bài 2: Truyện ngắn": ["Chữ người tử tù", "Hai đứa trẻ", "Vợ nhặt"],
            "Bài 3: Thơ trữ tình": ["Tỏ lòng", "Thu hứng", "Nhàn"],
            "Bài 4: Văn bản nghị luận": [
              "Chiếu dời đô",
              "Hịch tướng sĩ",
              "Bình Ngô đại cáo",
            ],
            "Bài 5: Văn bản thông tin": [
              "Động Phong Nha",
              "Ca Huế trên sông Hương",
              "Ai đã đặt tên cho dòng sông",
            ],
            "Bài 6: Truyện thơ dân gian": [
              "Truyện Kiều (trích)",
              "Lục Vân Tiên cứu Kiều Nguyệt Nga",
              "Thạch Sanh",
            ],
            "Bài 7: Hài kịch": [
              "Ông Giuốc-đanh mặc lễ phục",
              "Trưởng giả học làm sang",
              "Quan thanh tra",
            ],
            "Bài 8: Văn bản thuyết minh": [
              "Một thứ quà của lúa non: Cốm",
              "Trang phục truyền thống của người Việt",
              "Nghệ thuật bài chòi",
            ],
            "Bài 9: Tổng kết văn học": [
              "Khái quát văn học dân gian Việt Nam",
              "Khái quát văn học trung đại Việt Nam",
              "Khái quát văn học hiện đại Việt Nam",
            ],
          },
          11: {
            "Bài 1: Truyện ngắn và tiểu thuyết": [
              "Chí Phèo",
              "Vợ chồng A Phủ",
              "Chiếc thuyền ngoài xa",
            ],
            "Bài 2: Thơ": ["Vội vàng", "Tràng giang", "Đây thôn Vĩ Dạ"],
            "Bài 3: Văn bản nghị luận": [
              "Tinh thần yêu nước của nhân dân ta",
              "Đức tính giản dị của Bác Hồ",
              "Ý nghĩa văn chương",
            ],
            "Bài 4: Văn bản kí": [
              "Người lái đò sông Đà",
              "Ai đã đặt tên cho dòng sông",
              "Sông Đà",
            ],
            "Bài 5: Kịch": [
              "Hồn Trương Ba, da hàng thịt",
              "Vĩnh biệt Cửu Trùng Đài",
              "Quan thanh tra",
            ],
            "Bài 6: Văn bản thông tin": [
              "Thông tin về ngày Trái Đất",
              "Bảo vệ môi trường biển",
              "Biến đổi khí hậu",
            ],
            "Bài 7: Văn học nước ngoài": [
              "Số phận con người",
              "Ông già và biển cả",
              "Ruồi trâu",
            ],
            "Bài 8: Văn học và đời sống": [
              "Tuyên ngôn độc lập",
              "Nhật kí trong tù",
              "Những đứa con trong gia đình",
            ],
            "Bài 9: Tổng kết văn học": [
              "Giá trị nội dung văn học",
              "Giá trị nghệ thuật văn học",
              "Văn học và con người",
            ],
          },
          12: {
            "Bài 1: Khả năng lớn lao của tiểu thuyết": [
              "Xuân Tóc Đỏ cứu quốc",
              "Nỗi buồn chiến tranh",
            ],
            "Bài 2: Những thế giới thơ": [
              "Cảm hoài",
              "Tây Tiến",
              "Đàn ghi ta của Lor-ca",
            ],
            "Bài 3: Lập luận trong văn bản nghị luận": [
              "Nhìn về vốn văn hóa dân tộc",
              "Năng lực sáng tạo",
              "Mấy ý nghĩ về thơ",
            ],
            "Bài 4: Yếu tố kì ảo trong truyện kể": [
              "Hải khẩu linh từ",
              "Muối của rừng",
            ],
            "Bài 5: Tiếng cười của hài kịch": [
              "Nhân vật quan trọng",
              "Giấu của",
            ],
            "Bài 6: Hồ Chí Minh": [
              "Tác gia Hồ Chí Minh",
              "Tuyên ngôn Độc lập",
              "Mộ; Nguyên tiêu",
              "Những trò lố hay là Va-ren và Phan Bội Châu",
            ],
            "Bài 7: Sự thật trong tác phẩm kí": [
              "Nghệ thuật băm thịt gà",
              "Bước vào đời",
            ],
            "Bài 8: Dữ liệu trong văn bản thông tin": [
              "Pa-ra-na",
              "Giáo dục khai phóng ở Việt Nam",
              "Đời muối",
            ],
            "Bài 9: Văn học và cuộc đời": ["Vội vàng", "Trở về"],
          },
        };

        // Hàm an toàn để parse JSON từ localStorage
        function safeParse(str) {
          try {
            return JSON.parse(str);
          } catch (e) {
            console.warn("Dữ liệu localStorage hỏng, reset về mặc định:", e);
            return {};
          }
        }

        const app = document.getElementById("app");
        const modeBtn = document.getElementById("modeBtn");

        if (!app) {
          console.error("Không tìm thấy #app!");
          throw new Error("Không tìm thấy phần tử #app");
        }

        console.log("Tìm thấy #app, bắt đầu load data...");

        // Load data an toàn
        let savedLinks = safeParse(localStorage.getItem("links") || "{}");
        let optionConfig = safeParse(
          localStorage.getItem("optionConfig") || "{}"
        );
        console.log("Loaded data:", savedLinks, optionConfig);

        /* ===== MODE SWITCH ===== */
        modeBtn.onclick = () => {
          MODE = MODE === "student" ? "teacher" : "student";
          modeBtn.textContent =
            MODE === "student" ? "🎓 Chế độ: Học sinh" : "🧑‍🏫 Chế độ: Giáo viên";
          render();
        };

        /* ===== TOGGLE ===== */
        function toggleBox(box, parent) {
          const isOpen = box.classList.contains("show");
          parent
            .querySelectorAll(":scope > .box, :scope > .options")
            .forEach((b) => b.classList.remove("show"));
          if (!isOpen) box.classList.add("show");
        }

        /* ===== RENDER ===== */
        function render() {
          console.log("Render được gọi! MODE:", MODE);
          app.innerHTML = "";

          // Test nhanh (xóa dòng này sau khi test OK nếu muốn sạch)
          const testP = document.createElement("p");
          testP.style.color = "red";
          testP.style.fontWeight = "bold";
          testP.style.textAlign = "center";
          testP.textContent =
            "TEST: JS đang chạy và render() OK! Nội dung lớp học sẽ hiện dưới đây.";
          app.appendChild(testP);

          for (const grade in DATA) {
            const card = document.createElement("div");
            card.className = "card";

            const gradeTitle = document.createElement("div");
            gradeTitle.className = "grade";
            gradeTitle.textContent = "📖 Lớp " + grade;

            const gradeBox = document.createElement("div");
            gradeBox.className = "box";

            gradeTitle.onclick = () => gradeBox.classList.toggle("show");

            for (const lesson in DATA[grade]) {
              const lessonDiv = document.createElement("div");
              lessonDiv.className = "lesson";
              lessonDiv.textContent = lesson;

              const lessonBox = document.createElement("div");
              lessonBox.className = "box";

              lessonDiv.onclick = () => toggleBox(lessonBox, gradeBox);

              DATA[grade][lesson].forEach((text) => {
                const textDiv = document.createElement("div");
                textDiv.className = "text";
                textDiv.textContent = "📘 " + text;

                const optionBox = document.createElement("div");
                optionBox.className = "options";

                textDiv.onclick = () => toggleBox(optionBox, lessonBox);

                const keyBase = `${grade}-${lesson}-${text}`;
                savedLinks[keyBase] = savedLinks[keyBase] || {};
                optionConfig[keyBase] = optionConfig[keyBase] || {
                  enabled: OPTIONS.map((o) => o.key),
                };

                OPTIONS.forEach((opt) => {
                  if (
                    MODE === "student" &&
                    !optionConfig[keyBase].enabled.includes(opt.key)
                  )
                    return;

                  const row = document.createElement("div");
                  row.className = "option";
                  row.onclick = (e) => e.stopPropagation();

                  if (MODE === "teacher") {
                    const checked = optionConfig[keyBase].enabled.includes(
                      opt.key
                    );

                    row.innerHTML = `
                <label>
                  <input type="checkbox" ${checked ? "checked" : ""}>
                  ${opt.label}
                </label><br>
                <input type="text" placeholder="Nhập link..." value="${
                  savedLinks[keyBase][opt.key] || ""
                }">
              `;

                    const checkbox = row.querySelector("input[type=checkbox]");
                    const input = row.querySelector("input[type=text]");

                    checkbox.onchange = () => {
                      let list = optionConfig[keyBase].enabled;
                      if (checkbox.checked && !list.includes(opt.key)) {
                        list.push(opt.key);
                      }
                      if (!checkbox.checked) {
                        list = list.filter((k) => k !== opt.key);
                      }
                      optionConfig[keyBase].enabled = list;
                      localStorage.setItem(
                        "optionConfig",
                        JSON.stringify(optionConfig)
                      );
                      render();
                    };

                    input.onchange = (e) => {
                      savedLinks[keyBase][opt.key] = e.target.value.trim();
                      localStorage.setItem("links", JSON.stringify(savedLinks));
                    };
                  } else {
                    const link = savedLinks[keyBase][opt.key];
                    row.innerHTML = link
                      ? `<a href="${link}" target="_blank">${opt.label}</a>`
                      : `<span style="opacity:.5">${opt.label}</span>`;
                  }

                  optionBox.appendChild(row);
                });

                lessonBox.appendChild(textDiv);
                lessonBox.appendChild(optionBox);
              });

              gradeBox.appendChild(lessonDiv);
              gradeBox.appendChild(lessonBox);
            }

            card.appendChild(gradeTitle);
            card.appendChild(gradeBox);
            app.appendChild(card);
          }

          console.log("Render hoàn thành!");
        }

        render();
      } catch (error) {
        console.error("Lỗi trong script:", error);
        if (app) {
          app.innerHTML = `<p style="color: red; font-weight: bold; text-align: center; padding: 20px;">
      LỖI: ${error.message || "Không xác định"}<br>
      Hãy mở F12 → Application → Local Storage → Clear domain này, rồi refresh lại.
    </p>`;
        }
      }
    </script>
  </body>
</html>
